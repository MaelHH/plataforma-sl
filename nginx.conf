server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  gzip on;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

  # SPA: cualquier ruta cae en index.html (React Router del lado cliente).
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Estáticos con hash → cache larga.
  location ~* \.(?:js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|webp|ico)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  # El HTML no se cachea (para tomar cada deploy nuevo).
  location = /index.html {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
  }

  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;
  add_header Referrer-Policy "no-referrer" always;
}
