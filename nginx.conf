# Sitio nginx para Plataforma SL (dominio logisticasl.slagricola.cloud).
# Sirve la SPA (dist de Vite) y hace reverse-proxy de /api al backend (uvicorn :4104,
# mismo VPS). Construye el front con VITE_API_URL=/ para que llame a /api (relativo) y
# pase por este proxy: así NO expones el 4104 ni necesitas CORS, y sirve para http y https.
server {
  listen 80;
  server_name logisticasl.slagricola.cloud;

  # El dist se publica aquí (junto a bonos / mangoflow / market-intelligence), en browser/.
  root /home/rolandovaldez/apps/frontends/plataforma-sl/browser;
  index index.html;

  gzip on;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

  # /api → backend FastAPI (uvicorn) en el mismo VPS.
  location /api/ {
    proxy_pass http://127.0.0.1:4104;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 60s;
  }

  # SPA: cualquier ruta cae en index.html (router del lado cliente).
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Estáticos con hash → cache larga.
  location ~* \.(?:js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|webp|ico)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  # El HTML no se cachea (para tomar cada deploy nuevo).
  location = /index.html {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
  }

  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;
  add_header Referrer-Policy "no-referrer" always;
}
